<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONG Pecuária</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="images/icon.png" type="image/png">
</head>

<body class="login">
    <div id="login-form-container">
        <form class="login">
            <h1>Login</h1>
            <hr>
            <p class="campo-input">
                <label for="username">Usuário</label>
                <input type="text" name="username" id="username" required>
            </p>

            <p class="campo-input">
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" required>
            </p>

            <a href="cadastro.html">Criar uma conta.</a>

            <button type="submit">Entrar</button>
        </form>
    </div>

    <div id="login-img"></div>

    <script>
        // Reseta o conta logada anteriormente
        localStorage.setItem("conta", "");

        // Coleta os possíveis logins do localStorage
        let logins = JSON.parse(localStorage.getItem("usuarios")) || [];

        // Escuta envio do formulário
        const formulario = document.querySelector("form");
        formulario.addEventListener('submit', (e) => {
            e.preventDefault();

            // Coleta os elementos de formulario e inputs
            const username = document.querySelector("input#username").value;
            const senha = document.querySelector("input#senha").value;

            // Tenta encontrar o usuário com username e senha fornecidos
            const usuario = logins.find(u => u.username === username && u.senha === senha);
            
            // Se não existir o usuário, da um alerta e retorna a função
            if(!usuario){
                alert("Dados incorretos!");
                return;
            }
        
            // Seta a conta logada em localStorage
            localStorage.setItem("conta", JSON.stringify(usuario));

            // Redireciona a página principal de acordo com o tipo do usuário
            window.location.href = `${usuario.tipo}.html`
        })
    </script>
</body>

</html>
