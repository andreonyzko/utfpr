<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONG Pecuária</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="images/icon.png" type="image/png">
</head>
<body>
    <header>
        <div class="logo-menu">
            <img src="images/icon.png" alt="icone da pagina">
            <svg id="menu" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
        </div>
        <nav>
            <ul>
                <li><a href="./empresa.html">Meus Brindes</a></li>
                <li><a href="./cadastrarBrinde.html">Cadastrar Brinde</a></li>
                <li><a href="./index.html">Sair</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Cadastrar Brinde</h1>
        <hr>
        <form class="brinde">
            <p class="campo-input">
                <label for="fotoBrinde">URL Foto:</label>
                <input type="url" name="fotoBrinde" id="fotoBrinde" required>
            </p>
            <p class="campo-input">
                <label for="nomeBrinde">Nome</label>
                <input type="text" name="nomeBrinde" id="nomeBrinde" required>
            </p>
            <p class="campo-input">
                <label for="descBrinde">Descrição</label>
                <textarea name="descBrinde" id="descBrinde" required></textarea>
            </p>
            <p class="campo-input">
                <label for="valorBrinde">Valor em pontos</label>
                <input type="number" name="valorBrinde" id="valorBrinde" min="0" required>
            </p>
             <p class="campo-input">
                <label for="fotoBrinde">URL Resgate:</label>
                <input type="url" name="urlResgateBrinde" id="urlResgateBrinde" required>
            </p>

            <button type="submit">Cadastrar</button>
        </form>

        <script>
            const formulario = document.querySelector("form.brinde");
            formulario.addEventListener("submit", e => {
                e.preventDefault();

                // Coleta os valores do inputs
                const urlFoto = formulario.querySelector("#fotoBrinde").value;
                const nome = formulario.querySelector("#nomeBrinde").value;
                const desc = formulario.querySelector("#descBrinde").value;
                const valor = formulario.querySelector("#valorBrinde").value;
                const urlResgate = formulario.querySelector("#urlResgateBrinde").value;

                // Cria o objeto brinde
                const brinde = {
                    urlFoto, 
                    nome, 
                    desc, 
                    valor, 
                    urlResgate, 
                    dono: JSON.parse(localStorage.getItem("conta"))
                };

                // Coleta a lista do localStorage, adiciona o novo brinde e atualiza o localStorage
                const brindes = JSON.parse(localStorage.getItem("brindes")) || [];
                brindes.push(brinde);
                localStorage.setItem("brindes", JSON.stringify(brindes));

                // Redireciona para a página de meus brindes
                window.location.href = "empresa.html";
            })
        </script>
    </main>
    <script src="scripts/menu.js"></script>
</body>
</html>
